name: Build Stable Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-stable:
    runs-on: ubuntu-latest
    concurrency:
      group: stable-branch-build
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Composer production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Prepare production snapshot
        run: |
          rm -rf build/stable
          mkdir -p build/stable

          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "react-app/" \
            --exclude "tests/" \
            --exclude "docker/" \
            --exclude "wordpress/" \
            --exclude "docs/" \
            --exclude ".phpunit.cache/" \
            --exclude ".bin/" \
            --exclude ".codex" \
            --exclude ".dockerignore" \
            --exclude ".editorconfig" \
            --exclude ".env.example" \
            --exclude ".gitattributes" \
            --exclude ".gitignore" \
            --exclude ".nvmrc" \
            --exclude "Dockerfile" \
            --exclude "Makefile" \
            --exclude "docker-compose.yml" \
            --exclude "Minimal CI Job" \
            --exclude "README.md" \
            --exclude "TRANSACTION_IMPLEMENTATION_SUMMARY.md" \
            --exclude "RESPONSE_STRATEGY_MATRIX.md" \
            --exclude "todo_refactor.md" \
            --exclude "patchwork.json" \
            --exclude "phpcs.xml.dist" \
            --exclude "phpstan.neon" \
            --exclude "phpunit.xml" \
            --exclude "stan.txt" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "postcss.config.js" \
            --exclude "tailwind.config.js" \
            --exclude "tsconfig.json" \
            --exclude "tsconfig.node.json" \
            --exclude "vite.config.js" \
            --exclude "vite.config.ts" \
            --exclude "vitest.config.ts" \
            --exclude "vitest.setup.ts" \
            --exclude "move-css.js" \
            ./ build/stable/

      - name: Publish snapshot to stable branch
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          TARGET_BRANCH="stolmc"
          STABLE_WORKTREE="/tmp/stable-branch"
          rm -rf "${STABLE_WORKTREE}"

          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" > /dev/null; then
            git fetch origin "${TARGET_BRANCH}:${TARGET_BRANCH}"
            git worktree add "${STABLE_WORKTREE}" "${TARGET_BRANCH}"
          else
            git worktree add --detach "${STABLE_WORKTREE}"
            cd "${STABLE_WORKTREE}"
            git checkout --orphan "${TARGET_BRANCH}"
            cd "${GITHUB_WORKSPACE}"
          fi

          find "${STABLE_WORKTREE}" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          # Do not delete .git metadata in the destination worktree.
          rsync -a --exclude ".git" build/stable/ "${STABLE_WORKTREE}/"

          git -C "${STABLE_WORKTREE}" add -A

          if git -C "${STABLE_WORKTREE}" diff --cached --quiet; then
            echo "No changes to publish to stable branch."
            exit 0
          fi

          git -C "${STABLE_WORKTREE}" commit -m "chore(stable): refresh production snapshot from ${GITHUB_SHA}"
          git -C "${STABLE_WORKTREE}" push origin "${TARGET_BRANCH}" --force
